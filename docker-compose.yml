version: "3.9"

services:

  # -------------------------------------------------------
  # Base de donnees MongoDB
  # -------------------------------------------------------
  mongo:
    image: mongo:6
    container_name: tp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # Backend Node.js / Express
  # -------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tp-backend
    restart: unless-stopped
    env_file:
      - ./infra/env/backend.env
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  # -------------------------------------------------------
  # Frontend Vue 3 + Vite
  # -------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tp-frontend
    restart: unless-stopped
    env_file:
      - ./infra/env/frontend.env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
